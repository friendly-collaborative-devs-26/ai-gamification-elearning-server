app:
  name: "ai-gamification-elearning-server"
  env: "development"
  port: 8080
  version: "v1"
  debug: true

logger:
  level: "debug"
  encoding: "console"
  output: "stdout"
  caller: true
  stacktrace: false

server:
  read_timeout: 10
  write_timeout: 30

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
  allow_credentials: true
  max_age_seconds: 86400
